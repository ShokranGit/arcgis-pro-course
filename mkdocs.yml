site_name: ArcGIS Pro Course
site_description: "A practical learning hub for ArcGIS Pro tutorials, labs, datasets, and GIS concepts."
site_author: "Parisa Setayesh"
site_url: "https://ShokranGit.github.io/arcgis-pro-course/"

repo_name: "ShokranGit/arcgis-pro-course"
repo_url: "https://github.com/ShokranGit/arcgis-pro-course"
edit_uri: "edit/main/docs/"

theme:
  name: material
  language: en
  logo: assets/images/logo-placeholder.svg
  favicon: assets/images/logo-placeholder.svg
  palette:
    - scheme: default
      primary: green
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/css/extra.css
  - assets/css/lab-widget.css

extra_javascript:
  - assets/js/lab-widget.js
  - assets/js/topics-table.js

extra:
  course:
    software: "ArcGIS Pro"
    institution: "CUNY"
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/ShokranGit/arcgis-pro-course"
      name: "GitHub repository"

copyright: "Course materials for teaching and learning ArcGIS Pro."

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Lessons:
      - Overview: lessons/index.md
      - "00 · Introduction to GIS": lessons/00-introduction-to-gis.md
      - "01 · Getting Started": lessons/01-getting-started.md
      - "02 · Data, Layers, and Coordinate Systems": lessons/02-data-layers-coordinate-systems.md
      - "02b · Data Acquisition and Management": lessons/02b-data-management.md
      - "03 · Selection by Attribute": lessons/03-selection-by-attribute.md
      - "03b · Select by Location": lessons/03b-selection-by-location.md
      - "03c · Tabular Data Management": lessons/03c-tabular-data-management.md
      - "04 · Symbology and Map Design": lessons/04-symbology-map-design.md
      - "05 · Geoprocessing": lessons/05-geoprocessing.md
      - "06 · Raster Analysis": lessons/06-raster-analysis.md
      - "07 · Spatial Joins": lessons/07-spatial-joins.md
      - "08 · Introduction to Geospatial Programming": lessons/08-geospatial-programming.md
      - "09 · The Future of GISc": lessons/09-future-of-gisc.md
  - Courses:
      - "Principles of GISc — Fall 2026 (Lehman College)": courses/lehman-gisc-fall2026.md
      - "Intro to GIS — Spring 2027 (Hunter College)": courses/hunter-intro-gis-spring2027.md
  - Labs:
      - Overview: labs/index.md
      - "Select by Attributes": labs/select-by-attributes.md
      - "Select by Location": labs/select-by-location.md
      - "Buffer": labs/buffer.md
      - "Surface Analysis": labs/surface-analysis.md
      - "Map Algebra": labs/map-algebra.md
      - "Suitability Modeling": labs/suitability-modeling.md
      - "Table Join Slides": slides/table-join.md
      - "Projection Slides": slides/projection.md
  - GIS Concepts:
      - Overview: concepts/index.md
      - "Vector and Raster Data": concepts/vector-raster.md
      - "Coordinate Systems": concepts/coordinate-systems.md
      - "Attribute Tables": concepts/attribute-tables.md
  - Data: data.md
  - Troubleshooting: troubleshooting.md
  - Resources: resources.md
