site_name: ArcGIS Pro Course
site_description: "A practical learning hub for ArcGIS Pro tutorials, labs, datasets, and GIS concepts."
site_author: "Parisa Setayesh"
site_url: "https://ShokranGit.github.io/arcgis-pro-course/"

repo_name: "ShokranGit/arcgis-pro-course"
repo_url: "https://github.com/ShokranGit/arcgis-pro-course"
edit_uri: "edit/main/docs/"

theme:
  name: material
  language: en
  logo: assets/images/logo-placeholder.svg
  favicon: assets/images/logo-placeholder.svg
  palette:
    - scheme: default
      primary: green
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/css/extra.css

extra:
  course:
    software: "ArcGIS Pro"
    institution: "CUNY"
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/ShokranGit/arcgis-pro-course"
      name: "GitHub repository"

copyright: "Course materials for teaching and learning ArcGIS Pro."

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Lessons:
      - Overview: lessons/index.md
      - "01 · Getting Started": lessons/01-getting-started.md
      - "02 · Data, Layers, and Coordinate Systems": lessons/02-data-layers-coordinate-systems.md
      - "03 · Selection by Attribute": lessons/03-selection-by-attribute.md
      - "04 · Symbology and Map Design": lessons/04-symbology-map-design.md
      - "05 · Geoprocessing": lessons/05-geoprocessing.md
      - "06 · Raster Analysis": lessons/06-raster-analysis.md
  - Labs:
        - Labs:
      - Overview: labs/index.md
      - "Lab 01 · Course Overview and Software Installation": labs/lab-01-course-overview-software-installation.md
      - "Lab 02 · GIS History, Applications, and Map Types": labs/lab-02-gis-history-applications-map-types.md
      - "Lab 03 · ArcGIS Interface and Data Types": labs/lab-03-arcgis-interface-data-types.md
      - "Lab 04 · File Management and Data Acquisition": labs/lab-04-file-management-data-acquisition.md
      - "Lab 05 · Adding Data and Geodatabases": labs/lab-05-adding-data-geodatabases.md
      - "Lab 06 · Coordinate and Projection Systems": labs/lab-06-coordinate-projection-systems.md
      - "Lab 07 · Attribute Table and Field Management": labs/lab-07-attribute-table-field-management.md
      - "Lab 08 · Cartography, Classification, and Layout Design": labs/lab-08-cartography-classification-layout.md
      - "Lab 09 · Data Query and Selection": labs/lab-09-data-query-selection.md
      - "Lab 10 · Table Join and Spatial Join": labs/lab-10-table-join-spatial-join.md
      - "Lab 11 · Geoprocessing Tools": labs/lab-11-geoprocessing-tools.md
      - "Lab 12 · Raster Analysis and Geospatial Programming": labs/lab-12-raster-programming.md
      - "Lab 13 · Ethics and Future of GIS": labs/lab-13-ethics-future-gis.md
  - GIS Concepts:
      - Overview: concepts/index.md
      - "Vector and Raster Data": concepts/vector-raster.md
      - "Coordinate Systems": concepts/coordinate-systems.md
      - "Attribute Tables": concepts/attribute-tables.md
  - Data: data.md
  - Troubleshooting: troubleshooting.md
  - Resources: resources.md
